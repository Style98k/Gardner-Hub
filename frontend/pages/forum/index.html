<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gardner Hub — Categories</title>

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration -->
  <script src="../../js/tailwind-config.js"></script>

  <!-- Custom CSS overrides -->
  <link rel="stylesheet" href="../../ccss/dashboard.css" />
</head>

<body class="bg-gray-50 dark:bg-black font-sans text-gray-800 dark:text-gray-200 min-h-screen flex flex-col transition-colors duration-300">

  <!-- ============================================================
       HEADER — Logo · Search · User Profile
       ============================================================ -->
  <header class="sticky top-0 z-50 bg-white dark:bg-black border-b border-gray-200 dark:border-gray-800 shadow-sm transition-colors duration-300">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-4 sm:px-6 lg:px-8 h-16">

      <!-- Logo -->
      <a href="#" class="flex items-center gap-2 shrink-0">
        <div class="w-9 h-9 rounded-lg bg-brand-900 flex items-center justify-center">
          <span class="text-white font-bold text-lg leading-none">G</span>
        </div>
        <span class="text-xl font-bold text-brand-900 dark:text-brand-100 hidden sm:inline">The Gardner Hub</span>
      </a>

      <!-- Search bar (hidden on small screens, toggled via JS) -->
      <div id="searchWrapper" class="hidden sm:flex flex-1 max-w-md mx-6 relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-gray-500 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
        </svg>
        <input
          id="searchInput"
          type="text"
          placeholder="Search topics, categories…"
          class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 dark:border-gray-800 bg-gray-50 dark:bg-black text-sm text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-400 focus:border-brand-500 dark:focus:border-brand-400 transition-colors duration-200"
        />
      </div>

      <!-- Right side actions -->
      <div class="flex items-center gap-3">
        <!-- Theme toggle -->
        <button
          id="themeToggle"
          class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200"
          aria-label="Toggle theme"
        >
          <svg id="sunIcon" class="w-5 h-5 text-gray-600 dark:text-gray-300 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
          </svg>
          <svg id="moonIcon" class="w-5 h-5 text-gray-600 dark:text-gray-300 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
        </button>
        
        <!-- Mobile search toggle -->
        <button id="mobileSearchBtn" class="sm:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-900 transition-colors duration-200" aria-label="Search">
          <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
          </svg>
        </button>

        <!-- Notification bell -->
        <button class="relative p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-900 transition-colors duration-200" aria-label="Notifications">
          <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0a3 3 0 11-6 0m6 0H9"/>
          </svg>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>

        <!-- User profile chip with dropdown -->
        <div class="relative">
          <button id="profileBtn" class="flex items-center gap-2 pl-1 pr-3 py-1 rounded-full border border-gray-200 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors duration-200">
            <div class="w-8 h-8 rounded-full bg-brand-100 dark:bg-gray-900 flex items-center justify-center">
              <svg class="w-4 h-4 text-brand-700 dark:text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.118a7.5 7.5 0 0115 0A17.933 17.933 0 0112 21.75a17.933 17.933 0 01-7.5-1.632z"/>
              </svg>
            </div>
            <div class="hidden md:flex flex-col items-start leading-tight">
              <span class="text-sm font-semibold text-gray-800 dark:text-white">Admin User</span>
              <span class="text-[10px] font-medium text-brand-600 dark:text-gray-300 uppercase tracking-wide">Administrator</span>
            </div>
            <svg class="w-4 h-4 text-gray-400 dark:text-gray-500 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          
          <!-- Dropdown menu -->
          <div id="profileDropdown" class="hidden absolute right-0 top-12 w-56 bg-white dark:bg-black rounded-xl shadow-xl border border-gray-200 dark:border-gray-800 py-2 z-50 opacity-0 scale-95 transition-all duration-200">
            <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800">
              <p class="text-sm font-semibold text-gray-900 dark:text-white">Admin User</p>
              <p class="text-xs text-gray-500 dark:text-gray-400">admin@gardner.edu.ph</p>
              <span class="inline-block mt-1 text-[10px] font-semibold bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 px-2 py-0.5 rounded-full uppercase tracking-wide">Administrator</span>
            </div>
            <div class="py-2">
              <button class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors duration-150 flex items-center gap-3">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                My Profile
              </button>
              <button class="w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors duration-150 flex items-center gap-3">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Settings
              </button>
              <hr class="my-2 border-gray-100 dark:border-gray-800">
              <button id="logoutBtn" class="w-full px-4 py-2 text-left text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors duration-150 flex items-center gap-3">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile search bar (toggled) -->
    <div id="mobileSearch" class="hidden sm:hidden px-4 pb-3">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-gray-500 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
        </svg>
        <input
          type="text"
          placeholder="Search topics, categories…"
          class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 dark:border-gray-800 bg-gray-50 dark:bg-black text-sm text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-400 focus:border-brand-500 dark:focus:border-brand-400 transition-colors duration-200"
        />
      </div>
    </div>
  </header>

  <!-- ============================================================
       MAIN CONTENT
       ============================================================ -->
  <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Action Bar — Title + New Topic -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white">Categories</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Browse discussion categories or start a new topic</p>
      </div>
      <button
        id="newTopicBtn"
        class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand-900 dark:bg-brand-100 text-white dark:text-gray-900 text-sm font-semibold rounded-lg shadow hover:bg-brand-800 dark:hover:bg-brand-200 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-400 focus:ring-offset-2 dark:focus:ring-offset-gray-900 transition-colors duration-200"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
        New Topic
      </button>
    </div>

    <!-- Category Cards Container -->
    <div id="categoryList" class="grid gap-4">
      <!-- Cards are injected by forum.js -->
    </div>

  </main>

  <!-- ============================================================
       NEW TOPIC MODAL
       ============================================================ -->
  <div id="newTopicModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/40 backdrop-blur-sm p-4">
    <div class="bg-white dark:bg-black rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-modal transition-colors duration-300">

      <!-- Modal header -->
      <div class="flex items-center justify-between px-6 pt-6 pb-2">
        <h2 class="text-lg font-bold text-gray-900 dark:text-white">Create New Topic</h2>
        <button id="closeModalBtn" class="p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-900 transition-colors duration-200" aria-label="Close">
          <svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Modal body -->
      <form id="newTopicForm" class="px-6 pb-6 space-y-4">
        <!-- Category select -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category</label>
          <select id="topicCategory" class="w-full rounded-lg border border-gray-300 dark:border-gray-800 bg-white dark:bg-black text-gray-900 dark:text-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-400 focus:border-brand-500 dark:focus:border-brand-400 transition-colors duration-200">
            <option value="">Select a category…</option>
          </select>
        </div>

        <!-- Title -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Title</label>
          <input type="text" id="topicTitle" placeholder="Enter topic title" required class="w-full rounded-lg border border-gray-300 dark:border-gray-800 bg-white dark:bg-black text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-400 focus:border-brand-500 dark:focus:border-brand-400 transition-colors duration-200" />
        </div>

        <!-- Body -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
          <textarea id="topicBody" rows="4" placeholder="Write your topic description…" required class="w-full rounded-lg border border-gray-300 dark:border-gray-800 bg-white dark:bg-black text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 px-3 py-2 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-400 focus:border-brand-500 dark:focus:border-brand-400 transition-colors duration-200"></textarea>
        </div>

        <!-- Submit -->
        <button type="submit" class="w-full py-2.5 bg-brand-900 dark:bg-white text-white dark:text-black font-semibold text-sm rounded-lg shadow hover:bg-brand-800 dark:hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-white focus:ring-offset-2 dark:focus:ring-offset-black transition-colors duration-200">
          Post Topic
        </button>
      </form>
    </div>
  </div>

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-black mt-auto transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-gray-400 dark:text-gray-500">
      <span>&copy; 2026 The Gardner Hub. All rights reserved.</span>
      <span>Built for Gardner College &mdash; Community Forum</span>
    </div>
  </footer>

  <!-- Theme Management -->
  <script src="../../js/theme.js"></script>
  
  <!-- Forum JS -->
  <script src="../../js/forum.js"></script>
</body>
</html>
