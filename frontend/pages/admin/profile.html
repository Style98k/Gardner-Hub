<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Profile — The Gardner Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../js/tailwind-config.js"></script>
</head>
<body class="font-sans text-gray-800 dark:text-gray-200 min-h-screen bg-gray-50 dark:bg-black transition-colors duration-300">

  <!-- Header -->
  <header class="bg-white dark:bg-black border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center space-x-4">
          <a href="dashboard.html" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200" title="Back to Dashboard">
            <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
          </a>
          <div class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-brand-900 dark:bg-white shadow-md">
            <span class="text-white dark:text-black font-bold text-lg">G</span>
          </div>
          <div>
            <h1 class="text-xl font-bold text-gray-900 dark:text-white">The Gardner Hub</h1>
            <p class="text-xs text-gray-500 dark:text-gray-400">Admin Profile</p>
          </div>
        </div>

        <div class="flex items-center space-x-4">
          <a href="dashboard.html" class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors duration-200">Dashboard</a>
          <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors duration-200" title="Toggle theme">
            <svg class="w-5 h-5 text-yellow-500 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            <svg class="w-5 h-5 text-gray-600 block dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
          </button>
          <button onclick="logout()" class="px-4 py-2 text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors duration-200">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Profile Card -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden mb-8">
      <div class="h-32 bg-gradient-to-r from-gray-900 to-gray-700 dark:from-gray-800 dark:to-gray-600"></div>

      <div class="px-6 pb-6">
        <div class="flex flex-col sm:flex-row items-start sm:items-end gap-4 -mt-12">
          <!-- Photo -->
          <div class="relative">
            <div id="profilePhoto" class="w-24 h-24 rounded-full border-4 border-white dark:border-gray-900 bg-gray-900 dark:bg-gray-700 flex items-center justify-center shadow-lg overflow-hidden">
              <span id="profileInitial" class="text-white font-bold text-3xl"></span>
              <img id="profileImg" src="" alt="" class="hidden w-full h-full object-cover" />
            </div>
            <label for="photoUpload" class="absolute bottom-0 right-0 w-8 h-8 rounded-full bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 shadow-sm">
              <svg class="w-4 h-4 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </label>
            <input type="file" id="photoUpload" accept="image/*" class="hidden" onchange="uploadPhoto(this)" />
          </div>

          <!-- Name + Badge -->
          <div class="flex-1">
            <h2 id="profileName" class="text-2xl font-bold text-gray-900 dark:text-white"></h2>
            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-gray-900 dark:bg-white text-white dark:text-gray-900 mt-1">
              <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              Administrator
            </span>
          </div>

          <p id="profileEmail" class="text-sm text-gray-500 dark:text-gray-400 sm:text-right"></p>
        </div>
      </div>
    </div>

    <!-- System Stats -->
    <div class="mb-8">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">System Statistics</h3>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
        <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4 text-center">
          <p id="statTotal" class="text-2xl font-bold text-gray-900 dark:text-white">—</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Total Users</p>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4 text-center">
          <p id="statStudents" class="text-2xl font-bold text-blue-600 dark:text-blue-400">—</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Students</p>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4 text-center">
          <p id="statFaculty" class="text-2xl font-bold text-emerald-600 dark:text-emerald-400">—</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Faculty</p>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4 text-center">
          <p id="statThreads" class="text-2xl font-bold text-purple-600 dark:text-purple-400">—</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Threads</p>
        </div>
        <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4 text-center">
          <p id="statInquiries" class="text-2xl font-bold text-yellow-600 dark:text-yellow-400">—</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Inquiries</p>
        </div>
      </div>
    </div>

    <!-- User Management -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">User Management</h3>
        <div class="flex items-center gap-2">
          <select id="roleFilter" onchange="filterUsers()" class="text-sm bg-gray-100 dark:bg-gray-800 border-0 rounded-lg px-3 py-2 text-gray-700 dark:text-gray-300 focus:ring-2 focus:ring-brand-600">
            <option value="all">All Roles</option>
            <option value="student">Students</option>
            <option value="faculty">Faculty</option>
            <option value="admin">Admins</option>
          </select>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
          <thead class="text-xs uppercase text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700">
            <tr>
              <th class="px-4 py-3">Name</th>
              <th class="px-4 py-3">Email</th>
              <th class="px-4 py-3">Role</th>
              <th class="px-4 py-3">School ID</th>
              <th class="px-4 py-3">Joined</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400 dark:text-gray-500 italic">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="../../js/theme.js"></script>

  <script>
    var API_BASE = 'http://localhost:5000/api';
    var allUsers = [];

    function getCurrentUser() {
      try {
        var raw = localStorage.getItem('gardnerHub_user');
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }

    function getToken() {
      return localStorage.getItem('gardnerHub_token');
    }

    document.addEventListener('DOMContentLoaded', function() {
      var user = getCurrentUser();
      if (!user || user.role !== 'admin') {
        window.location.href = '../../index.html';
        return;
      }

      loadProfile(user);
      loadStats();
      loadUsers();
    });

    function loadProfile(user) {
      document.getElementById('profileName').textContent = user.full_name || 'Administrator';
      document.getElementById('profileEmail').textContent = user.email || '';
      document.getElementById('profileInitial').textContent = (user.full_name || 'A').charAt(0).toUpperCase();

      if (user.profile_photo) {
        var img = document.getElementById('profileImg');
        img.src = API_BASE.replace('/api', '') + '/uploads/profile_photos/' + user.profile_photo;
        img.classList.remove('hidden');
        document.getElementById('profileInitial').classList.add('hidden');
      }
    }

    function loadStats() {
      fetch(API_BASE + '/stats/community')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          document.getElementById('statTotal').textContent = data.totalCount || 0;
          document.getElementById('statStudents').textContent = data.studentCount || 0;
          document.getElementById('statFaculty').textContent = data.facultyCount || 0;
          document.getElementById('statThreads').textContent = data.threadCount || 0;
          document.getElementById('statInquiries').textContent = data.inquiryCount || 0;
        })
        .catch(function() {});
    }

    function loadUsers() {
      // We need a users list endpoint — fallback: fetch stats + use profile endpoint
      // For now, use a dedicated fetch. If /auth/users doesn't exist, we show a message.
      fetch(API_BASE + '/auth/users', {
        headers: { 'Authorization': 'Bearer ' + getToken() }
      })
      .then(function(res) {
        if (!res.ok) throw new Error('not available');
        return res.json();
      })
      .then(function(data) {
        allUsers = data.users || [];
        renderUsers(allUsers);
      })
      .catch(function() {
        document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400 dark:text-gray-500 italic">User list endpoint not available. Add GET /api/auth/users to enable this feature.</td></tr>';
      });
    }

    function renderUsers(users) {
      var tbody = document.getElementById('usersTableBody');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400 dark:text-gray-500 italic">No users found.</td></tr>';
        return;
      }

      var roleBadge = {
        admin: 'bg-gray-900 dark:bg-white text-white dark:text-gray-900',
        faculty: 'bg-emerald-100 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-300',
        student: 'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300'
      };

      tbody.innerHTML = users.map(function(u) {
        var badge = roleBadge[u.role] || roleBadge.student;
        var joined = u.created_at ? new Date(u.created_at).toLocaleDateString() : '—';
        return '<tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50">' +
          '<td class="px-4 py-3 font-medium text-gray-900 dark:text-white">' + escapeHtml(u.full_name) + '</td>' +
          '<td class="px-4 py-3 text-gray-500 dark:text-gray-400">' + escapeHtml(u.email) + '</td>' +
          '<td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs font-medium ' + badge + '">' + u.role + '</span></td>' +
          '<td class="px-4 py-3 text-gray-500 dark:text-gray-400">' + escapeHtml(u.school_id || '—') + '</td>' +
          '<td class="px-4 py-3 text-gray-500 dark:text-gray-400">' + joined + '</td>' +
        '</tr>';
      }).join('');
    }

    function filterUsers() {
      var role = document.getElementById('roleFilter').value;
      if (role === 'all') {
        renderUsers(allUsers);
      } else {
        renderUsers(allUsers.filter(function(u) { return u.role === role; }));
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function uploadPhoto(input) {
      if (!input.files || !input.files[0]) return;
      var file = input.files[0];
      if (file.size > 5 * 1024 * 1024) {
        alert('File must be under 5MB.');
        return;
      }

      var formData = new FormData();
      formData.append('photo', file);

      fetch(API_BASE + '/auth/profile/photo', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + getToken() },
        body: formData
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.profile_photo) {
          var img = document.getElementById('profileImg');
          img.src = API_BASE.replace('/api', '') + '/uploads/profile_photos/' + data.profile_photo;
          img.classList.remove('hidden');
          document.getElementById('profileInitial').classList.add('hidden');

          var user = getCurrentUser();
          user.profile_photo = data.profile_photo;
          localStorage.setItem('gardnerHub_user', JSON.stringify(user));
          alert('Profile photo updated!');
        }
      })
      .catch(function() {
        alert('Failed to upload photo.');
      });
    }

    function logout() {
      localStorage.removeItem('gardnerHub_user');
      localStorage.removeItem('gardnerHub_token');
      localStorage.removeItem('userRole');
      localStorage.removeItem('userName');
      window.location.href = '../../index.html';
    }
  </script>
</body>
</html>
