<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gardner Hub — Register</title>

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration -->
  <script src="js/tailwind-config.js"></script>
</head>

<body class="font-sans text-gray-800 dark:text-gray-200 bg-gray-50 dark:bg-black min-h-screen flex items-center justify-center p-4 py-12 transition-colors duration-300">

  <!-- Registration Container -->
  <div class="w-full max-w-lg relative">
    
    <!-- Logo & Header -->
    <div class="text-center mb-8">
      <a href="./index.html" class="inline-block">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-900 shadow-lg mb-4 logo-float cursor-pointer hover:bg-brand-800 transition">
          <span class="text-white font-bold text-2xl">G</span>
        </div>
      </a>
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Join The Gardner Hub</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">Create your account to get started</p>
    </div>

    <!-- Registration Card -->
    <div class="bg-white dark:bg-black rounded-2xl shadow-xl border border-gray-100 dark:border-gray-800 overflow-hidden card-enter transition-colors duration-300">
      <div class="p-8">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-6">Create new account</h2>

        <!-- Role Selector Tabs -->
        <div class="mb-6">
          <div class="flex gap-3 p-1.5 bg-gray-100 dark:bg-gray-900 rounded-xl">
            <!-- Student Tab -->
            <button
              type="button"
              id="studentTab"
              class="role-tab flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-lg font-medium text-sm transition-all duration-200 bg-white dark:bg-black text-gray-900 dark:text-white shadow-sm"
              data-role="student"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/>
              </svg>
              <span>Student</span>
            </button>
            
            <!-- Faculty/Staff Tab -->
            <button
              type="button"
              id="facultyTab"
              class="role-tab flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-lg font-medium text-sm transition-all duration-200 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white"
              data-role="faculty"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <span>Faculty / Staff</span>
            </button>
          </div>
        </div>

        <form id="registerForm" class="space-y-4">
          
          <!-- Full Name -->
          <div>
            <label for="fullName" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Full Name
            </label>
            <input
              type="text"
              id="fullName"
              placeholder="Juan Dela Cruz"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-black text-sm text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-400 focus:border-brand-500 dark:focus:border-brand-400 focus:bg-white dark:focus:bg-black transition-colors duration-200"
            />
          </div>

          <!-- Student ID / Employee ID (Dynamic) -->
          <div>
            <label for="userId" id="userIdLabel" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Student ID
            </label>
            <input
              type="text"
              id="userId"
              placeholder="2024-001234"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-800 bg-gray-50 dark:bg-black text-sm text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-400 focus:border-brand-500 dark:focus:border-brand-400 focus:bg-white dark:focus:bg-gray-900 transition-colors duration-200"
            />
          </div>

          <!-- Department (Dynamic) -->
          <div>
            <label for="department" id="departmentLabel" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Course / Strands 
            </label>
            <select
              id="department"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-800 bg-gray-50 dark:bg-black text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-white focus:border-brand-500 dark:focus:border-gray-600 focus:bg-white dark:focus:bg-black transition-colors duration-200"
            >
              <!-- Options will be populated dynamically -->
            </select>
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Email Address
            </label>
            <input
              type="email"
              id="email"
              placeholder="juan.delacruz@gardner.edu.ph"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-800 bg-gray-50 dark:bg-black text-sm text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-white focus:border-brand-500 dark:focus:border-gray-600 focus:bg-white dark:focus:bg-black transition-colors duration-200"
            />
          </div>

          <!-- Password -->
          <div>
            <label for="regPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Password
            </label>
            <input
              type="password"
              id="regPassword"
              placeholder="Minimum 8 characters"
              required
              minlength="8"
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-800 bg-gray-50 dark:bg-black text-sm text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-white focus:border-brand-500 dark:focus:border-gray-600 focus:bg-white dark:focus:bg-black transition-colors duration-200"
            />
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Confirm Password
            </label>
            <input
              type="password"
              id="confirmPassword"
              placeholder="Re-enter password"
              required
              minlength="8"
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-800 bg-gray-50 dark:bg-black text-sm text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-white focus:border-brand-500 dark:focus:border-gray-600 focus:bg-white dark:focus:bg-black transition-colors duration-200"
            />
            <p id="passwordError" class="hidden text-xs text-red-600 dark:text-red-400 mt-1">Passwords do not match</p>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="w-full py-3 bg-brand-900 dark:bg-white text-white dark:text-black font-semibold rounded-lg shadow-md hover:bg-brand-800 dark:hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-white focus:ring-offset-2 dark:focus:ring-offset-black transition-colors duration-200 transform active:scale-[0.98] mt-6"
          >
            Create Account
          </button>

        </form>
      </div>

      <!-- Login Link -->
      <div class="bg-gray-50 dark:bg-black px-8 py-4 border-t border-gray-100 dark:border-gray-800 text-center transition-colors duration-300">
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Already have an account? 
          <a href="./index.html" class="font-semibold text-brand-600 dark:text-white hover:text-brand-700 dark:hover:text-gray-200 hover:underline transition-colors duration-200">
            Sign in here
          </a>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8 text-xs text-gray-400 dark:text-gray-500">
      <p>&copy; 2026 The Gardner Hub. All rights reserved.</p>
    </div>

  </div>

  <!-- Theme Management -->
  <script src="./js/theme.js"></script>

  <!-- Role Selector Logic -->
  <script>
    // Role selection state (exposed to window for auth.js)
    window.currentRole = 'student';

    // Department options for each role
    const departmentOptions = {
      student: [
        { value: '', text: 'Select your course / strand' },
        { value: 'BSIT', text: 'BS Information Technology' },
        { value: 'BSCS', text: 'BS Computer Science' },
        { value: 'BSBA', text: 'BS Business Administration' },
        { value: 'BSCE', text: 'BS Computer Engineering' },
        { value: 'OTHER', text: 'Other' }
      ],
      faculty: [
        { value: '', text: 'Select your academic department' },
        { value: 'REG', text: 'Registrar Office' },
        { value: 'ADM', text: 'Administration' },
        { value: 'OTHER', text: 'Other' }
      ]
    };

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      const studentTab = document.getElementById('studentTab');
      const facultyTab = document.getElementById('facultyTab');
      
      // Set initial role to student
      updateRoleFields('student');
      
      // Add click handlers
      studentTab.addEventListener('click', function() {
        switchRole('student');
      });
      
      facultyTab.addEventListener('click', function() {
        switchRole('faculty');
      });
    });

    function switchRole(role) {
      if (currentRole === role) return;
      
      currentRole = role;
      const studentTab = document.getElementById('studentTab');
      const facultyTab = document.getElementById('facultyTab');
      
      // Update tab styling
      if (role === 'student') {
        studentTab.className = 'role-tab flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-lg font-medium text-sm transition-all duration-200 bg-white dark:bg-black text-gray-900 dark:text-white shadow-sm';
        facultyTab.className = 'role-tab flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-lg font-medium text-sm transition-all duration-200 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white';
      } else {
        facultyTab.className = 'role-tab flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-lg font-medium text-sm transition-all duration-200 bg-white dark:bg-black text-gray-900 dark:text-white shadow-sm';
        studentTab.className = 'role-tab flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-lg font-medium text-sm transition-all duration-200 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white';
      }
      
      // Update form fields
      updateRoleFields(role);
    }

    function updateRoleFields(role) {
      const userIdLabel = document.getElementById('userIdLabel');
      const userIdInput = document.getElementById('userId');
      const departmentLabel = document.getElementById('departmentLabel');
      const departmentSelect = document.getElementById('department');
      
      if (role === 'student') {
        // Update Student ID field
        userIdLabel.textContent = 'Student ID';
        userIdInput.placeholder = '2024-001234';
        
        // Update Course / Strand field
        departmentLabel.textContent = 'Course / Strand';
        
      } else {
        // Update Employee ID field
        userIdLabel.textContent = 'Employee ID';
        userIdInput.placeholder = 'EMP-2024-567';
        
        // Update Academic Department field
        departmentLabel.textContent = 'Academic Department';
      }
      
      // Populate department dropdown
      departmentSelect.innerHTML = '';
      departmentOptions[role].forEach(option => {
        const optElement = document.createElement('option');
        optElement.value = option.value;
        optElement.textContent = option.text;
        departmentSelect.appendChild(optElement);
      });
    }
  </script>

  <!-- Auth JavaScript -->
  <script src="./js/auth.js"></script>
</body>
</html>
